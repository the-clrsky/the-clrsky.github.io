<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <form id="expense-form">
            <input type="text" id="expense_title" placeholder="Expense Title">
            <input type="text" id="name" placeholder="Expense Name" required>
            <input type="number" id="quantity" placeholder="Quantity" required>
            <input type="number" id="unit_price" placeholder="Unit Price" required>
            <select id="category" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Others">Others</option>
            </select>
            <button type="submit">Add Expense</button>
        </form>
        <button id="print-report">Print Report</button>
        <table id="expense-table">
            <thead>
                <tr>
                    <th colspan="6" id="expense-title-header"></th>
                </tr>
                <tr>
                    <th>SL#</th>
                    <th>Name</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Amount</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody id="expense-list"></tbody>
        </table>
        <div>Total Expenses: <span id="total-expenses">0</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
