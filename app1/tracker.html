<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <title>Expense Tracker</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="menu-bar">
                <div class="name">Sadman Rahamat Bishal</div>
                <div class="menu">
                    <a href="../index.html">Home</a>
                    <a href="../projects.html">Projects</a>
                    <a href="../contact.html">Contact</a>
                </div>
            </div>
        </header>
        <h2>Expense Tracker</h2>
        <div class="error_message">
            <p>Enter a valid amount.</p>
        </div>
        <!--  Input Section Start  -->
        <div class="budget_content">
            <div class="ur_budget">
                <form>
                    <label for="budget">Your Budget: </label>
                    <input type="number" placeholder="Enter Budget" class="budget_input">
                    <button class="btn" id="btn_budget">Add Budget</button>
                </form>
            </div>
            <div class="ur_expenses">
                <form>
                    <label for="expenses">Expense Details: </label>
                    <input type="text" placeholder="Expense Details" class="expense_input">
                    <input type="number" placeholder="Expense Amount" class="expense_amount">
                    <button class="btn" id="btn_expenses">Add Expense</button>
                </form>
            </div>
        </div>
        <!--  Input Section End  -->
        
        <!--  Cards Start  -->
        <ul class="cards">
            <li>
                <i class="bx bx-money"></i>
                <span class="info">
                    <h3><span>৳</span><span class="budget_card"></span></h3>
                    <p>Budget</p>
                </span>
            </li>
            <li>
                <i class="bx bx-credit-card"></i>
                <span class="info">
                    <h3><span>৳</span><span class="expenses_card"></span></h3>
                    <p>Expenses</p>
                </span>
            </li>
            <li>
                <i class="bx bx-dollar"></i>
                <span class="info">
                    <h3><span>৳</span><span class="balance_card"></span></h3>
                    <p>Balance</p>
                </span>
            </li>
        </ul>
        <!--  Cards End  -->

        <!-- Print Section Start -->
        <div class="print_content">
            <label for="Event"><b>Event: </b></label>
            <input type="text" placeholder="Event Name" class="event_input">
            <button class="btn" id="btn_print">Print</button>
        </div>
        <!-- Print Section End -->

        <!-- Table Start -->
        <div class="tbl_content">
            <h4>Expense Details</h4>
            <div class="tbl_data">
                <!--
                <ul class="tbl_tr_content">

                </ul>
                -->
            </div>
        </div>
        <!-- Table End -->
    </div>
    <script src="script.js"></script>
</body>
</html>
