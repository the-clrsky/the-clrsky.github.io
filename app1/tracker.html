<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <script src="script.js"></script>
    <title>Event Expense Tracker</title>
</head>
<body>
    <div class="container">
        <h2>Event Expense Tracker</h2>
        <div class="error_message">
            <p>Enter a valid amount.</p>
        </div>
        <div class="ur_budget">
            <form>
                <label for="budget">Your Budget</label>
                <input type="number" placeholder="Enter Budget" class="budget_input">
                <button class="btn" id="btn_budget">Calculate</button>
            </form>
        </div>
        <div class="ur_expenses">
            <form>
                <label for="expenses">Expense Details</label>
                <input type="text" placeholder="Enter Expense Details" class="expense_input">
                <input type="number" placeholder="Enter Expense Amount" class="expense_input">
                <button class="btn" id="btn_expenses">Add Expense</button>
            </form>
        </div>
    </div>
</body>
</html>
